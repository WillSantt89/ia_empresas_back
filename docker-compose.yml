version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agent_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-agent_platform}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password_here}
      POSTGRES_DB: ${DB_NAME:-agent_platform}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agent_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent_network

  redis:
    image: redis:7-alpine
    container_name: agent_platform_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-your_redis_password_here} --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_platform_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${DB_USER:-agent_platform}:${DB_PASSWORD:-your_secure_password_here}@postgres:5432/${DB_NAME:-agent_platform}
      REDIS_URL: redis://default:${REDIS_PASSWORD:-your_redis_password_here}@redis:6379
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_min_32_chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your_aes_256_key_exactly_32_chars}
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:-your_webhook_api_key_here}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - agent_network
    command: npm run start

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${DB_USER:-agent_platform}:${DB_PASSWORD:-your_secure_password_here}@postgres:5432/${DB_NAME:-agent_platform}
      REDIS_URL: redis://default:${REDIS_PASSWORD:-your_redis_password_here}@redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your_aes_256_key_exactly_32_chars}
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:-your_webhook_api_key_here}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_min_32_chars}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - agent_network
    command: ["node", "src/worker.js"]
    deploy:
      replicas: ${WORKER_REPLICAS:-4}
      resources:
        limits:
          memory: 512M

networks:
  agent_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data: